name: Warden

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  warden:
    if: >-
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.user.type != 'Bot' ||
        contains(fromJSON('["fields-grove[bot]","fields-education-triage-autofixer[bot]"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.user.login, 'opencode')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ vars.WARDEN_APP_CLIENT_ID != '' }}
        id: app-token
        with:
          client-id: ${{ vars.WARDEN_APP_CLIENT_ID }}
          private-key: ${{ secrets.WARDEN_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: getsentry/warden@a7f3c5328550d9eda9bdf0e882bb09f14b82fab3 # v0.21.0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.WARDEN_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.WARDEN_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ vars.WARDEN_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.WARDEN_SMALL_FAST_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.WARDEN_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.WARDEN_DEFAULT_HAIKU_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.WARDEN_DEFAULT_OPUS_MODEL }}
          WARDEN_MODEL: ${{ vars.WARDEN_MODEL }}
          WARDEN_SENTRY_DSN: ${{ secrets.WARDEN_SENTRY_DSN }}
          WARDEN_ANTHROPIC_API_KEY: ${{ secrets.WARDEN_API_KEY }}
        with:
          anthropic-api-key: ${{ secrets.WARDEN_API_KEY }} # WARDEN_ANTHROPIC_API_KEY is the old key through opencode zen
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          request-changes: true
          parallel: 16
