name: Warden

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  warden:
    runs-on: ubuntu-latest
    env:
      WARDEN_MODEL: ${{ vars.WARDEN_MODEL || secrets.WARDEN_MODEL }}
      WARDEN_SENTRY_DSN: ${{ vars.WARDEN_SENTRY_DSN || secrets.WARDEN_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v2
        if: ${{ secrets.WARDEN_APP_ID != '' && secrets.WARDEN_PRIVATE_KEY != '' }}
        id: app-token
        with:
          app-id: ${{ secrets.WARDEN_APP_ID }}
          private-key: ${{ secrets.WARDEN_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: getsentry/warden@v1
        env:
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
        with:
          anthropic-api-key: ${{ secrets.WARDEN_ANTHROPIC_API_KEY }}
          github-token: ${{ steps.app-token.outputs.token || github.token }}
