name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conform:
    name: PR Title
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: blob:none
          fetch-depth: 1
          sparse-checkout: |
            .conform-pr-title.yaml
            .conform-pr-title.yml
            .conform.yaml
            .conform.yml
          sparse-checkout-cone-mode: false

      - name: Prepare PR title Conform config
        id: conform-config
        run: |
          set -euo pipefail

          write_fallback_config() {
            cat > .conform.yaml <<'EOF'
          policies:
            - type: commit
              spec:
                header:
                  length: 89
                  imperative: false
                  case: lower
                  invalidLastCharacters: .
                conventional:
                  types:
                    - feat
                    - fix
                    - perf
                    - refactor
                    - docs
                    - style
                    - test
                    - build
                    - ci
                    - chore
                    - revert
                  scopes:
                    - .*
                  descriptionLength: 89
          EOF
          }

          if [ -f .conform-pr-title.yaml ]; then
            cp .conform-pr-title.yaml .conform.yaml
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "mode=dedicated" >> "$GITHUB_OUTPUT"
            echo "source=.conform-pr-title.yaml" >> "$GITHUB_OUTPUT"
            echo "Using dedicated PR title Conform config from .conform-pr-title.yaml"
            exit 0
          fi

          if [ -f .conform-pr-title.yml ]; then
            cp .conform-pr-title.yml .conform.yaml
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "mode=dedicated" >> "$GITHUB_OUTPUT"
            echo "source=.conform-pr-title.yml" >> "$GITHUB_OUTPUT"
            echo "Using dedicated PR title Conform config from .conform-pr-title.yml"
            exit 0
          fi

          source_file=""
          if [ -f .conform.yaml ]; then
            source_file=".conform.yaml"
          elif [ -f .conform.yml ]; then
            source_file=".conform.yml"
          fi

          if [ -z "$source_file" ]; then
            write_fallback_config
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "mode=fallback" >> "$GITHUB_OUTPUT"
            echo "source=shared-default" >> "$GITHUB_OUTPUT"
            echo "Using shared default PR title Conform config. Add .conform-pr-title.yaml for repo-specific title rules, or add .conform.yaml/.yml to derive rules from your commit policy."
            exit 0
          fi

          if ruby - "$source_file" .conform.yaml <<'RUBY'
          require "yaml"

          source = ARGV.fetch(0)
          target = ARGV.fetch(1)

          def filter_hash(hash, allowed_keys)
            allowed_keys.each_with_object({}) do |key, filtered|
              filtered[key] = hash[key] if hash.key?(key)
            end
          end

          config = YAML.safe_load(
            File.read(source),
            permitted_classes: [],
            permitted_symbols: [],
            aliases: true,
            filename: source,
            fallback: {},
          ) || {}

          ignored = []
          policies = Array(config["policies"]).each_with_object([]) do |policy, derived_policies|
            next unless policy.is_a?(Hash)

            type = policy["type"]
            if type != "commit"
              ignored << "policy type #{type.inspect}"
              next
            end

            spec = policy["spec"]
            next unless spec.is_a?(Hash)

            derived = {}

            if (header = spec["header"]).is_a?(Hash)
              filtered_header = filter_hash(header, %w[length imperative case invalidLastCharacters jira])
              derived["header"] = filtered_header unless filtered_header.empty?

              ignored_header = header.keys - filtered_header.keys
              ignored.concat(ignored_header.sort.map { |key| "header.#{key}" })
            end

            if (conventional = spec["conventional"]).is_a?(Hash) && !conventional.empty?
              derived["conventional"] = conventional
            end

            if (spellcheck = spec["spellcheck"]).is_a?(Hash) && !spellcheck.empty?
              derived["spellcheck"] = spellcheck
            end

            ignored_top_level = spec.keys - %w[header conventional spellcheck body dco gpg maximumOfOneCommit]
            ignored.concat(%w[body dco gpg maximumOfOneCommit].select { |key| spec.key?(key) })
            ignored.concat(ignored_top_level.sort)

            next if derived.empty?

            derived_policies << {
              "type" => "commit",
              "spec" => derived,
            }
          end

          if policies.empty?
            warn "No title-safe commit rules found in #{source}"
            exit 3
          end

          File.write(target, { "policies" => policies }.to_yaml)

          ignored.uniq.sort.each do |entry|
            warn "Ignoring #{entry} for PR title validation"
          end
          RUBY
          then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "mode=derived" >> "$GITHUB_OUTPUT"
            echo "source=$source_file" >> "$GITHUB_OUTPUT"
            echo "Derived PR title Conform config from $source_file"
            exit 0
          fi

          ruby_status=$?
          if [ "$ruby_status" -ne 3 ]; then
            exit "$ruby_status"
          fi

          write_fallback_config
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "mode=fallback" >> "$GITHUB_OUTPUT"
          echo "source=$source_file" >> "$GITHUB_OUTPUT"
          echo "Using shared default PR title Conform config because $source_file does not define title-safe commit rules. Add .conform-pr-title.yaml for repo-specific title rules, or update .conform.yaml/.yml to derive PR title rules from commit policy."
          exit 0

      - name: Install conform
        if: steps.conform-config.outputs.exists == 'true'
        env:
          CONFORM_VERSION: v0.1.0-alpha.31
          CONFORM_SHA256: 344dd5fad42c61bf739491b490d453943d06f9aaed5488a738c0bbd4588b6914
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/conform" "https://github.com/siderolabs/conform/releases/download/${CONFORM_VERSION}/conform-linux-amd64"
          echo "${CONFORM_SHA256}  $HOME/.local/bin/conform" | sha256sum -c -
          chmod +x "$HOME/.local/bin/conform"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate PR title
        if: steps.conform-config.outputs.exists == 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          tmp_file="${RUNNER_TEMP}/pr-title.txt"
          printf '%s\n' "$PR_TITLE" > "$tmp_file"
          conform enforce --commit-msg-file "$tmp_file"
